replicaCount: 2

image:
  repository: nginx
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

datadog:
  env: dev
  service: sample-app
  version: "1.0.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70