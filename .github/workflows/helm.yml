name: Helm CI/CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: helm-obs-dev
  HELM_VERSION: "3.15.0"

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint — app-metrics
        run: helm lint charts/app-metrics --strict

      - name: Helm lint — datadog-agent
        run: helm lint charts/datadog-agent --strict

      - name: Helm template dry-run — app-metrics
        run: helm template app-metrics charts/app-metrics --debug

      - name: Helm template dry-run — datadog-agent
        run: |
          helm template datadog-agent charts/datadog-agent \
            --set clusterName=ci-test \
            --debug

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: lint
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Deploy datadog-agent
        run: |
          helm upgrade --install datadog-agent charts/datadog-agent \
            --namespace datadog \
            --create-namespace \
            --set clusterName=${{ env.CLUSTER_NAME }} \
            --set irsaRoleArn=${{ secrets.DATADOG_AGENT_ROLE_ARN }} \
            --atomic \
            --timeout 5m \
            --wait

      - name: Deploy app-metrics
        run: |
          helm upgrade --install app-metrics charts/app-metrics \
            --namespace default \
            --atomic \
            --timeout 5m \
            --wait

      - name: Verify deployments
        run: |
          kubectl get pods -A
          helm list -A